<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 AI Video Studio</title>
<style>
:root{--bg:#0f0f14;--panel:#1a1a24;--border:#2a2a3a;--accent:#6c5ce7;--text:#e0e0e0;--muted:#888;--success:#00d2a0;--warn:#f0c060;--danger:#ff5c5c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
#app{display:grid;grid-template-columns:380px 1fr;height:100vh}
/* 左侧面板 */
#sidebar{background:var(--panel);border-right:1px solid var(--border);padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
#sidebar h1{font-size:20px;color:var(--accent);margin-bottom:4px}
#sidebar .subtitle{font-size:12px;color:var(--muted);margin-bottom:12px}
.section{margin-bottom:16px}
.section label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.section select,.section input,.section textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#12121a;color:var(--text);font-size:14px}
.section select:focus,.section input:focus,.section textarea:focus{outline:none;border-color:var(--accent)}
.section textarea{resize:vertical;min-height:60px}
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.style-card{padding:10px;border:2px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;transition:all .2s}
.style-card:hover{border-color:var(--accent);background:#1e1e30}
.style-card.active{border-color:var(--accent);background:#1e1e30;box-shadow:0 0 12px rgba(108,92,231,.3)}
.style-card .icon{font-size:24px}
.style-card .name{font-size:12px;margin-top:4px}
.range-group{display:flex;align-items:center;gap:10px}
.range-group input[type=range]{flex:1}
.range-group .value{min-width:30px;text-align:center;font-weight:600;color:var(--accent)}
.toggle{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle-switch{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;transition:.2s}
.toggle-switch.on{background:var(--accent)}
.toggle-switch:after{content:'';width:20px;height:20px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.toggle-switch.on:after{left:22px}
button{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
button:hover{opacity:.9;transform:translateY(-2px)}
button:disabled{opacity:.5;cursor:not-allowed;transform:none}
/* 右侧面板 */
#main{display:flex;flex-direction:column;padding:24px;overflow-y:auto}
#progress-panel{flex:1}
.stage-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.stage-icon{font-size:28px;min-width:40px;text-align:center}
.stage-info{flex:1}
.stage-info .name{font-weight:600;font-size:15px}
.stage-info .status{font-size:12px;color:var(--muted);margin-top:2px}
.stage-status{font-size:14px;font-weight:600}
.stage-status.waiting{color:var(--muted)}
.stage-status.running{color:var(--warn)}
.stage-status.done{color:var(--success)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;width:0%}
#output-panel{margin-top:16px}
#output-panel h3{font-size:14px;margin-bottom:8px}
#log-box{background:#0a0a10;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;max-height:200px;overflow-y:auto;color:var(--muted)}
#log-box .log-line{margin:2px 0}
#result-box{display:none;margin-top:12px;padding:16px;background:#0a2a1a;border:1px solid var(--success);border-radius:8px}
#result-box h3{color:var(--success);margin-bottom:8px}
.model-hint{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <!-- 侧边栏 -->
  <div id="sidebar">
    <h1>🎬 AI Video Studio</h1>
    <div class="subtitle">多模型协作视频制作 · v2.0</div>

    <div class="section">
      <label>💡 视频创意</label>
      <textarea id="idea" placeholder="一句话描述你的视频想法...">一只小猫在霓虹灯下的东京街头寻找回家的路</textarea>
    </div>

    <div class="section">
      <label>🎨 视觉风格</label>
      <div class="style-grid" id="styleGrid"></div>
    </div>

    <div class="section">
      <label>🎬 剧本导演模型</label>
      <select id="directorModel"></select>
      <div class="model-hint" id="directorHint"></div>
    </div>

    <div class="section">
      <label>🎨 分镜图模型</label>
      <select id="storyboardModel"></select>
      <div class="model-hint" id="storyboardHint"></div>
    </div>

    <div class="section">
      <label>🎥 视频模型</label>
      <select id="videographerModel"></select>
      <div class="model-hint" id="videographerHint"></div>
    </div>

    <div class="section">
      <label>📐 场景数量</label>
      <div class="range-group">
        <input type="range" id="sceneCount" min="3" max="10" value="5">
        <span class="value" id="sceneCountVal">5</span>
      </div>
    </div>

    <div class="section">
      <label>⏱ 每场景时长（秒）</label>
      <div class="range-group">
        <input type="range" id="duration" min="2" max="10" value="5">
        <span class="value" id="durationVal">5</span>
      </div>
    </div>

    <div class="section">
      <label class="toggle" onclick="toggleMock()">
        <span>🧪 Mock 模式</span>
        <div class="toggle-switch on" id="mockToggle"></div>
      </label>
      <div class="model-hint">无需 API Key，Pillow 占位图演示全流程</div>
    </div>

    <button id="startBtn" onclick="startProduce()">🚀 开始制作</button>
  </div>

  <!-- 主面板 -->
  <div id="main">
    <div id="progress-panel">
      <div class="stage-row"><div class="stage-icon">🎬</div><div class="stage-info"><div class="name">Stage 1: 剧本导演</div><div class="status">生成结构化剧本 + StoryBible 上下文</div></div><div class="stage-status waiting" id="s1status">等待中</div></div>
      <div class="stage-row"><div class="stage-icon">🔍</div><div class="stage-info"><div class="name">审查: 剧本</div><div class="status">评分 + 不合格重试</div></div><div class="stage-status waiting" id="r1status">等待中</div></div>
      <div class="stage-row"><div class="stage-icon">🎨</div><div class="stage-info"><div class="name">Stage 2: 分镜师</div><div class="status">生成 5-8 张分镜图</div></div><div class="stage-status waiting" id="s2status">等待中</div></div>
      <div class="stage-row"><div class="stage-icon">🔍</div><div class="stage-info"><div class="name">审查: 分镜</div><div class="status">评分 + 不合格重试</div></div><div class="stage-status waiting" id="r2status">等待中</div></div>
      <div class="stage-row"><div class="stage-icon">🎥</div><div class="stage-info"><div class="name">Stage 3: 摄像师</div><div class="status">生成视频片段</div></div><div class="stage-status waiting" id="s3status">等待中</div></div>
      <div class="stage-row"><div class="stage-icon">🔍</div><div class="stage-info"><div class="name">审查: 视频</div><div class="status">最终质量检查</div></div><div class="stage-status waiting" id="r3status">等待中</div></div>
      <div class="stage-row"><div class="stage-icon">🎬</div><div class="stage-info"><div class="name">Stage 4: 合成导出</div><div class="status">图片序列 → MP4 + 字幕</div></div><div class="stage-status waiting" id="s4status">等待中</div></div>
      <div class="progress-bar"><div class="fill" id="overallProgress"></div></div>
    </div>

    <div id="output-panel">
      <h3>📋 运行日志</h3>
      <div id="log-box"><div class="log-line">等待开始...</div></div>
      <div id="result-box"><h3>🎉 制作完成！</h3><div id="resultContent"></div></div>
    </div>
  </div>
</div>

<script>
let mockMode = true;
let styles = [];
let models = {};

// 初始化
fetch('/api/models').then(r=>r.json()).then(data=>{
  models = data;
  styles = data.styles;

  // 风格卡片
  document.getElementById('styleGrid').innerHTML = data.styles.map((s,i)=>
    `<div class="style-card${i===0?' active':''}" onclick="selectStyle('${s.id}',this)" data-id="${s.id}">
      <div class="icon">${s.icon}</div><div class="name">${s.name}</div>
    </div>`).join('');

  // 模型下拉
  document.getElementById('directorModel').innerHTML = data.director.map(m=>
    `<option value="${m.id}">${m.name}</option>`).join('');
  document.getElementById('storyboardModel').innerHTML = data.storyboard.map(m=>
    `<option value="${m.id}">${m.name}</option>`).join('');
  document.getElementById('videographerModel').innerHTML = data.videographer.map(m=>
    `<option value="${m.id}">${m.name}</option>`).join('');

  updateModelHints();
});

// 风格选择
let selectedStyle = 'cinematic';
function selectStyle(id, el){
  selectedStyle = id;
  document.querySelectorAll('.style-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

// 模型切换提示
document.getElementById('directorModel').onchange = updateModelHints;
document.getElementById('storyboardModel').onchange = updateModelHints;
document.getElementById('videographerModel').onchange = updateModelHints;
function updateModelHints(){
  const dd = models.director?.find(m=>m.id===document.getElementById('directorModel').value);
  const ds = models.storyboard?.find(m=>m.id===document.getElementById('storyboardModel').value);
  const dv = models.videographer?.find(m=>m.id===document.getElementById('videographerModel').value);
  document.getElementById('directorHint').textContent = dd?.description||'';
  document.getElementById('storyboardHint').textContent = ds?.description||'';
  document.getElementById('videographerHint').textContent = dv?.description||'';
}

// 滑块
document.getElementById('sceneCount').oninput = function(){
  document.getElementById('sceneCountVal').textContent = this.value;
}
document.getElementById('duration').oninput = function(){
  document.getElementById('durationVal').textContent = this.value;
}

// Mock 切换
function toggleMock(){
  mockMode = !mockMode;
  document.getElementById('mockToggle').classList.toggle('on', mockMode);
}

// 状态更新
const stageIds = ['s1','r1','s2','r2','s3','r3','s4'];
function setStageStatus(id, status){
  const el = document.getElementById(id+'status');
  el.textContent = status === 'running' ? '进行中...' : status === 'done' ? '✅ 完成' : '等待中';
  el.className = 'stage-status ' + status;
}
function addLog(msg){
  const box = document.getElementById('log-box');
  box.innerHTML += `<div class="log-line">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

// 开始制作
async function startProduce(){
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 制作中...';
  document.getElementById('result-box').style.display = 'none';
  stageIds.forEach(id=>setStageStatus(id,'waiting'));
  document.getElementById('overallProgress').style.width = '0%';
  document.getElementById('log-box').innerHTML = '';

  addLog('🚀 开始制作...');
  setStageStatus('s1','running');

  const idea = document.getElementById('idea').value;
  const body = {
    idea, style: selectedStyle, use_mock: mockMode,
    director_model: document.getElementById('directorModel').value,
    storyboard_model: document.getElementById('storyboardModel').value,
    videographer_model: document.getElementById('videographerModel').value,
    scene_count: parseInt(document.getElementById('sceneCount').value),
    duration_per_scene: parseInt(document.getElementById('duration').value),
  };

  try{
    const resp = await fetch('/api/produce',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buf += decoder.decode(value,{stream:true});
      const lines = buf.split('\n\n');
      buf = lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        addLog(data.message || '');

        // 进度映射
        if(data.stage === 'script'){ setStageStatus('s1','running');setStageStatus('r1','running'); }
        if(data.stage === 'storyboard'){ setStageStatus('s1','done');setStageStatus('r1','done');setStageStatus('s2','running');setStageStatus('r2','running'); }
        if(data.stage === 'video'){ setStageStatus('s2','done');setStageStatus('r2','done');setStageStatus('s3','running');setStageStatus('r3','running'); }
        if(data.type === 'done'){
          setStageStatus('s3','done');setStageStatus('r3','done');setStageStatus('s4','done');
          document.getElementById('overallProgress').style.width = '100%';
          const r = data.result;
          document.getElementById('resultContent').innerHTML = `
            <p>📝 标题: <b>${r.title}</b></p>
            <p>🎬 场景: ${r.scenes} | 🎨 分镜: ${r.shots} | 🎥 片段: ${r.clips}</p>
            <p>💾 数据库: ${r.db_path}</p>
            <p>📊 ${r.progress_report}</p>`;
          document.getElementById('result-box').style.display = 'block';
        }
        document.getElementById('overallProgress').style.width = (data.progress||0)+'%';
      }
    }
  }catch(e){
    addLog('❌ 出错: '+e.message);
  }finally{
    btn.disabled = false;
    btn.textContent = '🚀 开始制作';
  }
}
</script>
</body>
</html>
