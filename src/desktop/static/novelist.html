<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 AI 小说家</title>
<style>
:root{--bg:#0d0d14;--panel:#13131f;--border:#1e1e32;--accent:#7c5ce7;--text:#d0d0d8;--muted:#666;--success:#00d2a0;--warn:#f0c060;--danger:#ff5c5c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
#app{display:grid;grid-template-columns:280px 1fr 260px;flex:1;overflow:hidden}
/* 左侧大纲 */
#outline-panel{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px}
#outline-panel h3{font-size:14px;color:var(--accent);margin-bottom:8px}
.outline-node{padding:4px 8px;cursor:pointer;border-radius:4px;font-size:13px;margin:2px 0}
.outline-node:hover{background:#1e1e35}
.outline-node.active{background:var(--accent);color:#fff}
.outline-node.done{color:var(--success)}
.outline-node.volume{font-weight:700;font-size:14px;margin-top:8px}
.outline-node.chapter{padding-left:16px}
.outline-node.section{padding-left:32px;font-size:12px;color:var(--muted)}
/* 中间写作区 */
#write-panel{display:flex;flex-direction:column;padding:16px;overflow-y:auto}
#context-bar{background:#0a0a14;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-size:11px;color:var(--muted);max-height:120px;overflow-y:auto;display:none}
#context-bar.show{display:block}
#context-bar h4{font-size:12px;color:var(--warn);margin-bottom:4px}
#content-area{flex:1;background:#0a0a10;border:1px solid var(--border);border-radius:8px;padding:20px;overflow-y:auto;line-height:1.8;font-size:15px;white-space:pre-wrap}
#content-area .streaming-cursor{display:inline-block;width:2px;height:18px;background:var(--accent);animation:blink 1s infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}
#placeholder{color:var(--muted);text-align:center;padding:60px 0;font-size:16px}
/* 右侧信息 */
#info-panel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:12px;font-size:12px}
#info-panel h3{font-size:14px;color:var(--accent);margin-bottom:8px}
.info-card{background:#0a0a14;border-radius:6px;padding:8px;margin-bottom:8px}
.info-card h4{font-size:12px;color:var(--warn);margin-bottom:4px}
/* 底部控制 */
#controls{background:var(--panel);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
#controls button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
#controls button:hover{transform:translateY(-1px)}
.btn-start{background:var(--accent);color:#fff}
.btn-pause{background:var(--warn);color:#000}
.btn-feedback{background:var(--border);color:var(--text)}
.btn-next{background:var(--success);color:#000}
.btn-outline{background:var(--border);color:var(--text)}
#progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
#progress-bar .fill{height:100%;background:var(--accent);transition:width .3s}
#feedback-input{flex:1;padding:8px 12px;background:#0a0a14;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;display:none}
/* 初始化 */ 
#init-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
#init-box{background:var(--panel);padding:30px;border-radius:12px;width:500px}
#init-box h2{color:var(--accent);margin-bottom:16px}
#init-box label{display:block;margin:8px 0 4px;font-size:13px}
#init-box textarea,#init-box select{width:100%;padding:10px;background:#0a0a14;border:1px solid var(--border);border-radius:6px;color:var(--text)}
#init-box button{width:100%;padding:12px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="init-modal">
  <div id="init-box">
    <h2>📖 开始写小说</h2>
    <label>💡 想写什么故事？</label>
    <textarea id="novel-idea" rows="3" placeholder="比如：一个996程序员觉醒了修仙能力，在都市中潜行修炼..."></textarea>
    <label>📚 类型</label>
    <select id="novel-genre">
      <option>玄幻</option><option>科幻</option><option>都市</option>
      <option>悬疑</option><option>言情</option><option>历史</option>
    </select>
    <button onclick="initNovel()">🚀 开始构思</button>
  </div>
</div>

<div id="app" style="display:none">
  <!-- 左侧大纲 -->
  <div id="outline-panel">
    <h3>📋 大纲</h3><div id="outline-tree"></div>
  </div>
  <!-- 中间 -->
  <div id="write-panel">
    <div id="context-bar"><h4>🧠 注入的上下文 (token预算)</h4><pre id="context-text"></pre></div>
    <div id="content-area"><div id="placeholder">👈 点击左侧大纲的某一节开始写作</div></div>
  </div>
  <!-- 右侧 -->
  <div id="info-panel">
    <h3>📊 信息</h3>
    <div class="info-card"><h4>📈 进度</h4><div id="progress-info">等待初始化...</div></div>
    <div class="info-card"><h4>👥 角色</h4><div id="character-list">-</div></div>
    <div class="info-card"><h4>📌 活跃伏笔</h4><div id="thread-list">-</div></div>
    <div class="info-card"><h4>🌍 世界观</h4><div id="rule-list">-</div></div>
  </div>
</div>

<!-- 底部控制 -->
<div id="controls" style="display:none">
  <button class="btn-start" onclick="startWrite()">▶ 开始写</button>
  <button class="btn-pause" onclick="togglePause()">⏸ 暂停</button>
  <button class="btn-next" onclick="nextSection()">⏭ 下一节</button>
  <input id="feedback-input" placeholder="输入反馈意见后按回车..." onkeydown="if(event.key==='Enter')sendFeedback()">
  <button class="btn-feedback" onclick="showFeedback()">💬 反馈</button>
  <div id="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
  <span id="progress-text" style="font-size:12px;color:var(--muted);min-width:80px">0%</span>
</div>

<script>
let currentNovel = null;
let currentOutline = [];
let selectedNode = null;
let eventSource = null;
let paused = false;

async function initNovel(){
  const idea = document.getElementById('novel-idea').value || '一个普通人在都市中觉醒超能力';
  const genre = document.getElementById('novel-genre').value;
  
  const r = await fetch('/api/init',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({idea, genre})
  });
  const data = await r.json();
  currentNovel = data;
  currentOutline = data.outline;
  
  document.getElementById('init-modal').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
  document.getElementById('controls').style.display = 'flex';
  
  renderOutline();
  updateProgress();
}

function renderOutline(){
  const tree = document.getElementById('outline-tree');
  tree.innerHTML = currentOutline.map(node => {
    const cls = `outline-node ${node.level} ${node.status==='done'?'done':''}`;
    const indent = node.level==='volume'?'':'　';
    return `<div class="${cls}" data-id="${node.id}" onclick="selectNode(${node.id})">
      ${indent}${node.status==='done'?'✅':node.level==='volume'?'📘':node.level==='chapter'?'📄':'📝'} ${node.title}
    </div>`;
  }).join('');
}

function selectNode(nodeId){
  selectedNode = nodeId;
  document.querySelectorAll('.outline-node').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-id="${nodeId}"]`)?.classList.add('active');
  document.getElementById('placeholder').innerHTML = 
    `已选择: ${currentOutline.find(n=>n.id===nodeId)?.title || ''}<br><br>点击「▶ 开始写」开始`;
}

function startWrite(){
  if(!selectedNode) return alert('请先选择左侧大纲的一节');
  if(eventSource) eventSource.close();
  
  const content = document.getElementById('content-area');
  content.innerHTML = '<span class="streaming-cursor"></span>';
  document.getElementById('context-bar').classList.add('show');
  
  eventSource = new EventSource(`/api/write/${selectedNode}`);
  
  eventSource.addEventListener('context', e => {
    const d = JSON.parse(e.data);
    document.getElementById('context-text').textContent = 
      `Token预算: ~${d.tokens} tokens\n${d.text}`;
  });
  
  eventSource.addEventListener('content', e => {
    if(paused) return;
    const d = JSON.parse(e.data);
    content.innerHTML += d.text;
    content.scrollTop = content.scrollHeight;
  });
  
  eventSource.addEventListener('done', e => {
    const d = JSON.parse(e.data);
    updateProgress(d.progress);
    eventSource.close();
    renderOutline();
  });
  
  eventSource.onerror = () => eventSource?.close();
}

function togglePause(){
  paused = !paused;
  fetch('/api/pause',{method:'POST'});
  document.querySelector('.btn-pause').textContent = paused ? '▶ 继续' : '⏸ 暂停';
}

function showFeedback(){
  const inp = document.getElementById('feedback-input');
  inp.style.display = inp.style.display === 'none' ? 'block' : 'none';
  if(inp.style.display==='block') inp.focus();
}

function sendFeedback(){
  const inp = document.getElementById('feedback-input');
  const fb = inp.value.trim();
  if(!fb) return;
  inp.value = '';
  inp.style.display = 'none';
  
  // 把反馈加到内容区，然后继续生成
  const content = document.getElementById('content-area');
  content.innerHTML += `\n\n[💬 反馈: ${fb}]\n\n`;
  
  // TODO: 发送反馈到后端触发重写
  if(eventSource) eventSource.close();
  startWrite(); // 简化：重新开始写（带上反馈上下文）
}

function nextSection(){
  // 找下一个 section
  const idx = currentOutline.findIndex(n=>n.id===selectedNode);
  if(idx>=0 && idx+1 < currentOutline.length){
    for(let i=idx+1;i<currentOutline.length;i++){
      if(currentOutline[i].level==='section'){
        selectNode(currentOutline[i].id);
        startWrite();
        return;
      }
    }
  }
  alert('已经是最后一节了！');
}

function updateProgress(p){
  const progress = p || {};
  const pct = progress.progress_pct || 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = pct+'%';
  document.getElementById('progress-info').innerHTML = 
    `章节: ${progress.done_sections||0}/${progress.total_sections||0}<br>` +
    `字数: ${(progress.total_words||0).toLocaleString()}<br>` +
    `角色: ${progress.characters||0} | 伏笔: ${progress.open_threads||0}`;
}
</script>
</body>
</html>
